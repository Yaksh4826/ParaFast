<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParaFast AI — Chat</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#050a14;color:#c8d8f0;min-height:100vh;
    display:flex;flex-direction:column;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(0,180,255,.03) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(0,180,255,.03) 1px,transparent 1px);
    background-size:60px 60px;z-index:0;pointer-events:none;
  }

  /* ── Auth Panel ── */
  #auth-panel{
    position:relative;z-index:1;max-width:420px;margin:60px auto;padding:2rem;
    background:rgba(0,10,28,.85);border:1px solid rgba(0,180,255,.2);border-radius:12px;
    backdrop-filter:blur(6px);
  }
  #auth-panel h1{font-size:1.4rem;color:#00b4ff;margin-bottom:.3rem}
  #auth-panel p.sub{font-size:.82rem;color:#4a7a9a;margin-bottom:1.5rem}
  .tab-row{display:flex;gap:.5rem;margin-bottom:1.25rem}
  .tab-btn{
    flex:1;padding:.55rem;border:1px solid rgba(0,180,255,.25);border-radius:6px;
    background:transparent;color:#5a8aa8;font-weight:600;cursor:pointer;
    font-family:inherit;font-size:.85rem;transition:all .2s;
  }
  .tab-btn.active{background:rgba(0,180,255,.12);color:#00b4ff;border-color:rgba(0,180,255,.5)}
  .field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem}
  .field label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#5a8aa8}
  .field input{
    background:rgba(0,20,50,.6);border:1px solid rgba(0,180,255,.2);border-radius:6px;
    padding:.55rem .75rem;color:#c8d8f0;font-family:inherit;font-size:.9rem;
  }
  .field input:focus{outline:none;border-color:rgba(0,180,255,.6);box-shadow:0 0 0 3px rgba(0,180,255,.1)}
  .auth-btn{
    width:100%;padding:.65rem;border:1px solid rgba(0,180,255,.5);border-radius:6px;
    background:rgba(0,180,255,.12);color:#00b4ff;font-weight:700;font-size:.92rem;
    cursor:pointer;font-family:inherit;transition:all .2s;
  }
  .auth-btn:hover{background:rgba(0,180,255,.22);box-shadow:0 0 20px rgba(0,180,255,.2)}
  .auth-err{color:#ff6b6b;font-size:.82rem;margin-top:.75rem;min-height:1.2em}
  .signup-fields{display:none}
  .signup-fields.show{display:block}

  /* ── Chat Panel ── */
  #chat-panel{
    display:none;position:relative;z-index:1;
    flex:1;max-width:720px;width:100%;margin:0 auto;
    padding:1rem 1rem 0;
    display:none;flex-direction:column;
  }
  #chat-panel.visible{display:flex}
  .chat-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:.75rem 0;border-bottom:1px solid rgba(0,180,255,.15);margin-bottom:.75rem;
  }
  .chat-header h2{font-size:1.1rem;color:#00b4ff}
  .chat-header .user-badge{font-size:.78rem;color:#5a8aa8}
  .logout-btn{
    padding:.35rem .9rem;border:1px solid rgba(255,100,100,.3);border-radius:5px;
    background:transparent;color:#ff6b6b;font-size:.75rem;cursor:pointer;font-family:inherit;
  }
  .logout-btn:hover{background:rgba(255,100,100,.1)}

  #messages{
    flex:1;overflow-y:auto;padding:.5rem 0;display:flex;flex-direction:column;gap:.6rem;
  }
  .msg{
    max-width:85%;padding:.65rem 1rem;border-radius:12px;font-size:.9rem;line-height:1.5;
    word-wrap:break-word;white-space:pre-wrap;
  }
  .msg.user{
    align-self:flex-end;background:rgba(0,180,255,.15);border:1px solid rgba(0,180,255,.3);
    border-bottom-right-radius:4px;
  }
  .msg.bot{
    align-self:flex-start;background:rgba(0,30,60,.6);border:1px solid rgba(0,180,255,.12);
    border-bottom-left-radius:4px;
  }
  .msg.bot.typing{color:#5a8aa8;font-style:italic}

  #input-row{
    display:flex;gap:.5rem;padding:.75rem 0 1rem;
    border-top:1px solid rgba(0,180,255,.1);
  }
  #msg-input{
    flex:1;padding:.6rem .85rem;
    background:rgba(0,20,50,.6);border:1px solid rgba(0,180,255,.2);border-radius:8px;
    color:#c8d8f0;font-family:inherit;font-size:.92rem;
  }
  #msg-input:focus{outline:none;border-color:rgba(0,180,255,.5)}
  #send-btn{
    padding:.6rem 1.4rem;border:1px solid rgba(0,180,255,.5);border-radius:8px;
    background:rgba(0,180,255,.12);color:#00b4ff;font-weight:700;cursor:pointer;
    font-family:inherit;font-size:.92rem;transition:all .2s;
  }
  #send-btn:hover{background:rgba(0,180,255,.22)}
  #send-btn:disabled{opacity:.4;cursor:not-allowed}

  #messages::-webkit-scrollbar{width:6px}
  #messages::-webkit-scrollbar-track{background:transparent}
  #messages::-webkit-scrollbar-thumb{background:rgba(0,180,255,.2);border-radius:3px}
</style>
</head>
<body>

<!-- ═══ AUTH ═══ -->
<div id="auth-panel">
  <h1>ParaFast AI</h1>
  <p class="sub">EAI Ambulance Service — Multi-Agent Assistant</p>

  <div class="tab-row">
    <button class="tab-btn active" onclick="showTab('login')">Log In</button>
    <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
  </div>

  <form id="auth-form" onsubmit="handleAuth(event)">
    <div class="field">
      <label>Badge Number</label>
      <input id="a-badge" required placeholder="B001">
    </div>

    <div class="signup-fields" id="signup-fields">
      <div class="field"><label>First Name</label><input id="a-first" placeholder="Jane"></div>
      <div class="field"><label>Last Name</label><input id="a-last" placeholder="Smith"></div>
      <div class="field"><label>Team Number</label><input id="a-team" placeholder="Team07"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <input id="a-pass" type="password" required placeholder="••••••••">
    </div>

    <button type="submit" class="auth-btn" id="auth-submit-btn">Log In</button>
    <div class="auth-err" id="auth-err"></div>
  </form>
</div>

<!-- ═══ CHAT ═══ -->
<div id="chat-panel">
  <div class="chat-header">
    <div>
      <h2>ParaFast AI</h2>
      <span class="user-badge" id="user-label"></span>
    </div>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
  <div id="messages"></div>
  <div id="input-row">
    <input id="msg-input" placeholder="Type a message…" autocomplete="off">
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const API = window.location.origin;
let TOKEN = null;
let MODE = 'login';

function showTab(mode) {
  MODE = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[mode === 'login' ? 0 : 1].classList.add('active');
  document.getElementById('signup-fields').classList.toggle('show', mode === 'signup');
  document.getElementById('auth-submit-btn').textContent = mode === 'login' ? 'Log In' : 'Sign Up';
  document.getElementById('auth-err').textContent = '';
}

async function handleAuth(e) {
  e.preventDefault();
  const err = document.getElementById('auth-err');
  err.textContent = '';

  const badge = document.getElementById('a-badge').value.trim();
  const pass = document.getElementById('a-pass').value;

  let url, body;
  if (MODE === 'login') {
    url = `${API}/auth/login`;
    body = { badge_number: badge, password: pass };
  } else {
    url = `${API}/auth/signup`;
    body = {
      badge_number: badge,
      first_name: document.getElementById('a-first').value.trim(),
      last_name: document.getElementById('a-last').value.trim(),
      team_number: document.getElementById('a-team').value.trim(),
      password: pass,
    };
  }

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.detail || 'Error'; return; }

    TOKEN = data.access_token;
    document.getElementById('user-label').textContent = `${data.name}  •  ${data.badge_number}`;
    document.getElementById('auth-panel').style.display = 'none';
    document.getElementById('chat-panel').classList.add('visible');
    document.getElementById('msg-input').focus();
  } catch (ex) {
    err.textContent = 'Connection failed';
  }
}

async function logout() {
  if (TOKEN) {
    fetch(`${API}/auth/logout`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${TOKEN}` },
    }).catch(() => {});
  }
  TOKEN = null;
  document.getElementById('auth-panel').style.display = '';
  document.getElementById('chat-panel').classList.remove('visible');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('a-pass').value = '';
}

function addMsg(text, role) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMsg(text, 'user');
  const typing = addMsg('Thinking…', 'bot typing');
  document.getElementById('send-btn').disabled = true;

  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 120000);
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${TOKEN}`,
      },
      body: JSON.stringify({ message: text }),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    const data = await res.json();
    typing.remove();
    if (!res.ok) {
      addMsg(`Error: ${data.detail || 'Something went wrong'}`, 'bot');
    } else {
      addMsg(data.reply, 'bot');
    }
  } catch (ex) {
    typing.remove();
    if (ex.name === 'AbortError') {
      addMsg('That took too long — the agent might be busy. Try again?', 'bot');
    } else {
      addMsg('Connection failed — is the server running?', 'bot');
    }
  }
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
